<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portfolio — terminal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Fira+Code:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-panel: #0e0e16;
            --border: #1a1a2e;
            --text: #ffffff;
            --text-dim: #ffffff;
            --text-bright: #e8e8f0;
            --green: #00ff88;
            --green-dim: #00cc6a;
            --green-glow: rgba(0, 255, 136, 0.15);
            --amber: #ffb800;
            --cyan: #00d4ff;
            --magenta: #ff3888;
            --red: #ff4444;
            --purple: #a855f7;
            --cursor-blink: 1s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-width: thin;
            scrollbar-color: var(--border) var(--bg);
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg,
                    transparent, transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 9998;
        }

        .terminal-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }



        .terminal-body {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 30px;
            min-height: 600px;
            position: relative;
            margin-top: 20px;
        }

        #output {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt-line {
            display: flex;
            align-items: center;
            margin-top: 4px;
        }

        .prompt-symbol {
            color: var(--green);
            margin-right: 4px;
            user-select: none;
            text-shadow: 0 0 8px var(--green-glow);
        }

        .prompt-path {
            color: var(--cyan);
            margin-right: 8px;
            user-select: none;
        }

        .prompt-git {
            color: var(--magenta);
            margin-right: 8px;
            user-select: none;
        }

        .prompt-arrow {
            color: var(--green);
            margin-right: 8px;
            user-select: none;
            text-shadow: 0 0 8px var(--green-glow);
        }

        #command-input {
            background: none;
            border: none;
            color: var(--text-bright);
            font-family: inherit;
            font-size: inherit;
            outline: none;
            width: 100%;
            caret-color: var(--green);
            line-height: inherit;
            position: relative;
            z-index: 2;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-hints {
            position: absolute;
            top: 0;
            left: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 100%;
            pointer-events: auto;
            transition: opacity 0.2s;
            z-index: 1;
        }

        .input-hints.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .ghost-cmd {
            color: var(--text-dim);
            opacity: 0.7;
            cursor: pointer;
            font-size: inherit;
            transition: opacity 0.2s, color 0.2s;
            position: relative;
            z-index: 3;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
        }

        .ghost-cmd:hover {
            opacity: 1;
            color: var(--green);
        }

        .ghost-sep {
            color: var(--text-dim);
            opacity: 0.5;
            font-size: inherit;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .line {
            margin: 1px 0;
        }

        .line-green {
            color: var(--green);
            text-shadow: 0 0 6px var(--green-glow);
        }

        .line-amber {
            color: var(--amber);
        }

        .line-cyan {
            color: var(--cyan);
        }

        .line-magenta {
            color: var(--magenta);
        }

        .line-red {
            color: var(--red);
        }

        .line-purple {
            color: var(--purple);
        }

        .line-dim {
            color: var(--text-dim);
        }

        .line-bright {
            color: var(--text-bright);
        }

        .line-bold {
            font-weight: 700;
        }

        .ascii-art {
            color: var(--green);
            text-shadow: 0 0 10px var(--green-glow);
            font-size: 11px;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .tag {
            display: inline-block;
            font-size: inherit;
            margin: 0 2px 0 0;
            color: var(--cyan);
        }

        .tag::before {
            content: '[';
            color: var(--text-dim);
        }

        .tag::after {
            content: ']';
            color: var(--text-dim);
        }

        .separator {
            color: var(--text-dim);
            margin: 6px 0;
            opacity: 0.4;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 16px;
            background: var(--green);
            color: var(--bg);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }


        .cmd-link {
            color: var(--green);
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
        }

        .cmd-link:hover {
            text-shadow: 0 0 6px var(--green-glow);
        }

        /* Recruiter banner — styled as a terminal MOTD notice */
        .recruiter-banner {
            border: 1px dashed var(--amber);
            padding: 8px 14px;
            margin: 2px 0;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .recruiter-banner:hover {
            border-color: var(--green);
            background: rgba(0, 255, 136, 0.03);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }

        @media (max-width: 640px) {
            .terminal-wrapper {
                padding: 8px;
            }

            .terminal-body {
                padding: 16px;
            }

            .ascii-art {
                font-size: 7px;
            }

            body {
                font-size: 13px;
            }
        }
    </style>
</head>

                startContactFlow();
            },

            links() {
                printBlank();
                print('Links & Profiles', 'line-bright line-bold');
                printSep();
                print(`  <span class="line-dim">email</span>     <span class="line-cyan">${CONFIG.email}</span>`);
                print(`  <span class="line-dim">phone</span>     <span class="line-cyan">${CONFIG.phone}</span>`);
                print(`  <span class="line-dim">github</span>    <span class="line-cyan">${CONFIG.github}</span>`);
                print(`  <span class="line-dim">linkedin</span>  <span class="line-cyan">${CONFIG.linkedin}</span>`);
                printBlank();
            },

            neofetch() {
                printBlank();
                const info = [
                    `<span class="line-green line-bold">${CONFIG.name}@portfolio</span>`,
                    `<span class="line-dim">${'\u2500'.repeat(30)}</span>`,
                    `<span class="line-amber">OS:</span>        CS & Math Brain v2.0`,
                    `<span class="line-amber">Host:</span>      UIUC, Champaign-Urbana`,
                    `<span class="line-amber">Kernel:</span>    Caffeine 4.2.0-lts`,
                    `<span class="line-amber">Uptime:</span>    Coding since '22`,
                    `<span class="line-amber">Shell:</span>     quantum-flavored zsh`,
                    `<span class="line-amber">Research:</span>  Google, UChicago, CSL`,
                    `<span class="line-amber">Focus:</span>     Quantum | Distributed | ML`,
                    `<span class="line-amber">Lang:</span>      ${CONFIG.skills.languages.join(', ')}`,
                    `<span class="line-amber">Theme:</span>     Custom (green phosphor)`,
                ];

                const art = [
                    '    +================+',
                    '    |  +---------+   |',
                    '    |  | > hello |   |',
                    '    |  | > world |   |',
                    '    |  | > _     |   |',
                    '    |  +---------+   |',
                    '    +================+',
                    '     ///////////////',
                    '    +----------------+',
                    '    +----------------+',
                    '',
                ];

                for (let i = 0; i < Math.max(art.length, info.length); i++) {
                    const a = art[i] || '                       ';
                    const b = info[i] || '';
                    print(`<span class="line-cyan">${a}</span>   ${b}`);
                }
                printBlank();

                const colors = ['#ff5f57', '#febc2e', '#28c840', '#00d4ff', '#a855f7', '#ff3888', '#ffb800', '#c0c0d0'];
                const blocks = colors.map(c => `<span style="background:${c};color:${c}">===</span>`).join('');
                print('    ' + blocks);
                printBlank();
            },

            resume() {
                printBlank();
                print(`<span class="line-green line-bold">${CONFIG.name}</span>`);
                print(`<span class="line-cyan">${CONFIG.title}</span>`);
                print(`<span class="line-dim">${CONFIG.email} | ${CONFIG.phone} | ${CONFIG.location}</span>`);
                printSep();

                print('<span class="line-bright line-bold">Education</span>');
                print(`  ${CONFIG.education.university}`);
                print(`  <span class="line-cyan">${CONFIG.education.degree}</span> <span class="line-dim">(${CONFIG.education.period})</span>`);
                print(`  <span class="line-dim">Previously:</span> ${CONFIG.education.prior}`);
                printBlank();

                print('<span class="line-bright line-bold">Skills</span>');
                Object.entries(CONFIG.skills).forEach(([category, items]) => {
                    const label = category.charAt(0).toUpperCase() + category.slice(1);
                    print(`  <span class="line-amber">${label.padEnd(12)}</span>${items.join(', ')}`);
                });
                printBlank();

                print('<span class="line-bright line-bold">Research</span>');
                CONFIG.research.forEach(r => {
                    print(`  <span class="line-green">${r.name}</span> <span class="line-dim">-- ${r.role} (${r.period})</span>`);
                });
                printBlank();

                print('<span class="line-bright line-bold">Projects</span>');
                CONFIG.projects.forEach(p => {
                    print(`  <span class="line-green">${p.name}</span> <span class="line-dim">-- ${p.context}</span>`);
                });
                printBlank();

                print('<span class="line-bright line-bold">Awards</span>');
                CONFIG.awards.forEach(a => {
                    print(`  <span class="line-amber">*</span> ${a}`);
                });
                printBlank();

                print(`<span class="line-dim">Type </span><span class="cmd-link" onclick="runCmd('research')">research</span><span class="line-dim"> or </span><span class="cmd-link" onclick="runCmd('projects')">projects</span><span class="line-dim"> for details, or </span><span class="cmd-link" onclick="runCmd('contact')">contact</span><span class="line-dim"> to get in touch.</span>`);
                printBlank();
            },

            overview() {
                printBlank();
                print('<span class="line-dim">$ cat README.md</span>');
                printBlank();
                print(`<span class="line-bright line-bold">${CONFIG.name}</span>`);
                print(`<span class="line-cyan">${CONFIG.title}</span>`);
                printSep();
                printBlank();
                print('I build software at the boundary of theory and practice.');
                print('My research spans quantum computing, distributed GPU systems,');
                print('and machine learning -- always with an eye on real-world impact.');
                printBlank();
                print('<span class="line-bright line-bold">Where I\'ve worked</span>');
                print('  <span class="line-green">Google</span>           Quantum ML & cryptography (2 years)');
                print('  <span class="line-green">UChicago</span>         Quantum chaos & spin dynamics');
                print('  <span class="line-green">UIUC CSL</span>         Distributed GPU failover (current)');
                print('  <span class="line-green">Benedictine U</span>    Differential modeling, published');
                printBlank();
                print('<span class="line-bright line-bold">What I\'ve built</span>');
                print('  <span class="line-green">Nexus AI</span>         Document intelligence platform (RAG + Claude)');
                print('  <span class="line-green">FutureYou</span>        AI career mentor -- hackathon winner');
                print('  <span class="line-green">Pricing models</span>   Options pricing for financial engineering');
                printBlank();
                print('<span class="line-bright line-bold">What I bring</span>');
                print('  Strong technical foundations with research depth.');
                print('  Clear communicator -- presented to teams at Google');
                print('  and at an international research symposium.');
                print('  Collaborative -- mentored peers, organized competitions');
                print('  for 450+ students, secured sponsorships from Jane Street.');
                printBlank();
                print(`<span class="line-dim">Reach me at </span><span class="line-cyan">${CONFIG.email}</span><span class="line-dim"> or type </span><span class="cmd-link" onclick="runCmd('contact')">contact</span>`);
                printBlank();
            },

            clear() { output.innerHTML = ''; },

            history() {
                printBlank();
                history.forEach((cmd, i) => {
                    print(`  <span class="line-dim">${String(i + 1).padStart(4)}</span>  ${cmd}`);
                });
                printBlank();
            },

            date() {
                printBlank();
                print(new Date().toString(), 'line-cyan');
                printBlank();
            },

            echo(args) {
                printBlank();
                printRaw(args || '');
                printBlank();
            },

            photo() {
                printBlank();
                print('ASCII Portrait', 'line-bright line-bold');
                print('<span class="line-dim">Loading high-res portrait...</span>');
                printSep();
                fetch('ansi_html.txt')
                    .then(r => r.text())
                    .then(html => {
                        const artDiv = document.createElement('div');
                        artDiv.className = 'fade-in';
                        artDiv.innerHTML = html;
                        output.appendChild(artDiv);
                        printBlank();
                        scrollBottom();
                    })
                    .catch(() => {
                        print('<span class="line-red">Failed to load portrait</span>');
                    });
            }
        };

        function runCmd(cmd) {
            print(`<span class="prompt-symbol">></span> <span class="prompt-path">~/portfolio</span> <span class="prompt-git">(main)</span> <span class="prompt-arrow">$</span> <span class="line-bright">${escapeHtml(cmd)}</span>`);
            history.push(cmd);
            historyIndex = history.length;
            if (commands[cmd]) { commands[cmd](); }
            scrollBottom();
            input.focus();
        }

        function boot() {
            const pre = document.createElement('pre');
            pre.className = 'ascii-art fade-in';
            pre.textContent = BANNER;
            output.appendChild(pre);

            // Load photo portrait with info beside it
            const heroSection = document.createElement('div');
            heroSection.className = 'fade-in';
            heroSection.style.cssText = 'display:flex;align-items:center;gap:20px;margin:2px 0;';

            const photoContainer = document.createElement('div');
            const infoContainer = document.createElement('div');
            infoContainer.style.lineHeight = '1.1';
            infoContainer.innerHTML = `
                <div class="line-green line-bold" style="font-size:18px;margin-bottom:2px;line-height:1.2;">${CONFIG.name}</div>
                <div class="line-cyan" style="margin-bottom:2px;line-height:1.2;">${CONFIG.title}</div>
                <div class="line-dim" style="line-height:1.2;">${CONFIG.email}</div>
                <div class="line-dim" style="line-height:1.2;">${CONFIG.location}</div>
            `;

            heroSection.appendChild(photoContainer);
            heroSection.appendChild(infoContainer);
            output.appendChild(heroSection);

            fetch('ansi_html.txt')
                .then(r => r.text())
                .then(html => {
                    photoContainer.innerHTML = html + '<div class="line-dim" style="font-size:10px;margin-top:4px;white-space:nowrap;">^btw, this is art generated to ansii -- highlight it :p</div>';
                    scrollBottom();
                })
                .catch(() => { });

            printBlank();

            // Recruiter banner — terminal MOTD style
            const banner = document.createElement('div');
            banner.className = 'recruiter-banner fade-in';
            banner.onclick = () => runCmd('overview');
            banner.innerHTML = `<span class="line-amber">[ NOTICE ]</span> <span class="line-dim">Not a developer?</span> <span class="line-bright">Click here</span> <span class="line-dim">or type</span> <span class="line-green">overview</span> <span class="line-dim">for a plain-english summary.</span>`;
            output.appendChild(banner);

            printBlank();

            const cmds = [
                { cmd: 'resume', label: 'full resume' },
                { cmd: 'research', label: 'research experience' },
                { cmd: 'projects', label: 'featured projects' },
                { cmd: 'skills', label: 'tech stack' },
                { cmd: 'contact', label: 'get in touch' },
            ];
            cmds.forEach(c => {
                print(`  <span class="cmd-link" onclick="runCmd('${c.cmd}')">${c.cmd}</span>  <span class="line-dim">-- ${c.label}</span>`);
            });
            printBlank();
            print(`<span class="line-dim">Click a command, use the bar below, or type </span><span class="cmd-link" onclick="runCmd('help')">help</span>`);
            printBlank();

            scrollBottom();
        }

        const inputHints = document.getElementById('input-hints');

        input.addEventListener('input', function () {
            inputHints.classList.toggle('hidden', input.value.length > 0);
        });

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const val = input.value.trim();
                if (!val) return;

                print(`<span class="prompt-symbol">></span> <span class="prompt-path">~/portfolio</span> <span class="prompt-git">(main)</span> <span class="prompt-arrow">$</span> <span class="line-bright">${escapeHtml(val)}</span>`);

                history.push(val);
                historyIndex = history.length;

                const parts = val.split(/\s+/);
                const cmd = parts[0].toLowerCase();
                const args = parts.slice(1).join(' ');

                if (commands[cmd]) {
                    commands[cmd](args);
                } else {
                    printBlank();
                    print(`<span class="line-red">command not found: ${escapeHtml(cmd)}</span>`);
                    print(`<span class="line-dim">Type 'help' for available commands.</span>`);
                    printBlank();
                }

                input.value = '';
                inputHints.classList.remove('hidden');
                scrollBottom();
            }

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) { historyIndex--; input.value = history[historyIndex]; }
            }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < history.length - 1) { historyIndex++; input.value = history[historyIndex]; }
                else { historyIndex = history.length; input.value = ''; }
            }
        });

        terminal.addEventListener('click', () => input.focus());

        let contactFlow = null;
        const contactSteps = [
            { key: 'name', prompt: 'name' },
            { key: 'email', prompt: 'email' },
            { key: 'subject', prompt: 'subject' },
            { key: 'message', prompt: 'message' },
        ];

        function startContactFlow() {
            contactFlow = { step: 0, data: {} };
            showContactPrompt();
        }

        function showContactPrompt() {
            const step = contactSteps[contactFlow.step];
            const line = document.createElement('div');
            line.className = 'line fade-in';
            line.innerHTML = `<span class="line-amber">${step.prompt}:</span> `;
            output.appendChild(line);

            document.getElementById('prompt-line').style.display = 'none';

            const ci = document.createElement('input');
            ci.type = 'text';
            ci.spellcheck = false;
            ci.autocomplete = 'off';
            ci.style.cssText = 'background:none;border:none;color:#e8e8f0;font-family:inherit;font-size:inherit;outline:none;caret-color:#00ff88;width:60%;';
            line.appendChild(ci);
            ci.focus();

            ci.addEventListener('keydown', function handler(e) {
                if (e.key === 'Enter') {
                    const val = ci.value.trim();
                    if (!val) return;
                    ci.removeEventListener('keydown', handler);
                    ci.replaceWith(document.createTextNode(val));
                    contactFlow.data[contactSteps[contactFlow.step].key] = val;
                    contactFlow.step++;
                    if (contactFlow.step < contactSteps.length) { showContactPrompt(); }
                    else { finishContactFlow(); }
                }
                if (e.key === 'Escape') {
                    ci.removeEventListener('keydown', handler);
                    ci.replaceWith(document.createTextNode('^C'));
                    print('<span class="line-red">  contact: aborted</span>');
                    printBlank();
                    contactFlow = null;
                    document.getElementById('prompt-line').style.display = 'flex';
                    input.focus();
                    scrollBottom();
                }
            });
            scrollBottom();
        }

        function finishContactFlow() {
            const d = contactFlow.data;
            printBlank();
            printSep();
            print('<span class="line-green">+ Message queued for /dev/inbox</span>');
            print(`<span class="line-dim">  from: ${escapeHtml(d.name)} &lt;${escapeHtml(d.email)}&gt;</span>`);
            print(`<span class="line-dim">  subj: ${escapeHtml(d.subject)}</span>`);
            print(`<span class="line-dim">  body: ${escapeHtml(d.message.substring(0, 60))}${d.message.length > 60 ? '...' : ''}</span>`);
            print('<span class="line-dim">  (Wire to your backend/email service in production)</span>');
            printBlank();
            contactFlow = null;
            document.getElementById('prompt-line').style.display = 'flex';
            input.focus();
            scrollBottom();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        boot();
        input.focus();
    </script>
</body>

</html>
